<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Quiniela Registrada! - Quiniela Treebolito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f5f9;
        }
        .container {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .folio {
            background: rgba(16, 185, 129, 0.15);
            border: 2px solid #10b981;
            border-radius: 12px;
            padding: 20px 30px;
            display: inline-block;
            margin: 20px 0;
        }
        .folio-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .folio-code {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fbbf24;
            letter-spacing: 2px;
        }
        .info {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            margin: 10px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }
        .btn-whatsapp {
            background: #25d366;
            color: white;
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <h1>¡Quiniela Registrada!</h1>
        <p>Tu participación ha sido confirmada correctamente.</p>
        
        <div class="folio">
            <div class="folio-label">Tu ID de Quiniela</div>
            <div class="folio-code" id="folioDisplay">QL-2026-XXXX</div>
        </div>
        
        <div class="info">
            <p>📱 <strong>Guarda este ID</strong> - Lo necesitarás para reclamar tu premio si ganas.</p>
            <p>🏆 ¡Mucha suerte! El premio acumulado te espera.</p>
        </div>
        
        <div>
            <a href="http://localhost:3000" class="btn btn-primary">Volver al inicio</a>
            <button class="btn btn-whatsapp" onclick="compartirWhatsApp()">📤 Compartir</button>
        </div>
    </div>

    <script>
        // Obtener folio de la URL
        const params = new URLSearchParams(window.location.search);
        const folio = params.get('id') || 'QL-2026-XXXX';
        document.getElementById('folioDisplay').textContent = folio;
        
        function compartirWhatsApp() {
            const msg = encodeURIComponent(
                `¡Hola! Acabo de participar en la Quiniela Treebolito.\n\n` +
                `Mi ID: ${folio}\n` +
                `¡Mucha suerte a todos! ⚽🍀`
            );
            window.open(`https://wa.me/523344294184?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
